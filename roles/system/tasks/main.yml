---
# systemd-resolved is required for `tailscale set --accept-dns`, which pushes
# Tailscale's DNS into the local resolver. It must also be started early here
# (before its place in the service loop below) because package downloads need DNS.
- name: Start systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: started

# This early symlink is bootstrap-only so package downloads have DNS. The same
# symlink appears again below after etckeeper is initialized, so the change is tracked.
- name: Symlink resolv.conf to stub resolver
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
    follow: false

- name: Install rate-mirrors
  community.general.pacman:
    name: rate-mirrors
    state: present

- name: Generate sorted mirror list
  ansible.builtin.command: rate-mirrors {{ mirror_flavor }}
  become_user: "{{ target_user }}"
  register: _mirrors
  changed_when: false

- name: Write sorted mirror list
  ansible.builtin.copy:
    content: "{{ _mirrors.stdout }}\n"
    dest: /etc/pacman.d/mirrorlist
    mode: '0644'

- name: Remove firefox
  community.general.pacman:
    name: firefox
    state: absent
  failed_when: false

- name: Install x86-only packages
  community.general.pacman:
    name:
      - discord
      - signal-desktop
      - apostrophe
    state: present
  when: not is_aarch64

- name: Install grub-btrfs
  community.general.pacman:
    name: grub-btrfs
    state: present
  when: has_grub

- name: Install IR remote control tools
  community.general.pacman:
    name: v4l-utils
    state: present
  when: has_ir_receiver

- name: Install packages
  community.general.pacman:
    name:
      # version control + /etc tracking
      - etckeeper
      - git
      - git-delta
      # bluetooth
      - blueman
      # networking
      - gvfs-dnssd
      - tailscale
      # keyring
      - seahorse
      # firmware updates
      - fwupd
      # communication
      - guvcview
      # office
      - libreoffice-fresh
      - abiword
      - xed
      # printing
      - cups
      - cups-browsed
      - system-config-printer
      # desktop portals (xdg-desktop-portal-gtk deliberately omitted: it enables
      # geolocation via browser, which also requires XDG_CURRENT_DESKTOP=GNOME)
      - xdg-desktop-portal
      - xdg-desktop-portal-wlr
      # system tools
      - btop
      - conky
      - inotify-tools
      - fastfetch
      - tmux
      - the_silver_searcher
      - xorg-xhost
      # dev tools
      - glow
      - tig
      - github-cli
      - socat
      - bats
      # power management
      - tlp
      - tlp-rdw
      - powertop
      # pacman cache cleanup
      - pacman-contrib
      # cron daemon
      - cronie
    state: present
  retries: 3
  delay: 10
  register: _pkg_install
  until: _pkg_install is succeeded

- name: Initialize etckeeper
  ansible.builtin.command: etckeeper init
  args:
    creates: /etc/.git
  notify: Etckeeper commit

- name: Rename etckeeper branch to hostname
  ansible.builtin.shell: |
    current=$(git -C /etc symbolic-ref --short HEAD 2>/dev/null)
    target="{{ ansible_facts['hostname'] }}"
    if [ "$current" != "$target" ]; then
      git -C /etc branch -m "$target"
      echo changed
    fi
  register: _branch_rename
  changed_when: _branch_rename.stdout == 'changed'

- name: Configure root git identity
  community.general.git_config:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    scope: file
    file: /root/.gitconfig
  loop:
    - key: user.email
      value: "root@{{ ansible_facts['hostname'] }}"
    - key: user.name
      value: "root@{{ ansible_facts['hostname'] }}"

- name: Configure git identity in /etc
  community.general.git_config:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    repo: /etc
    scope: local
  loop:
    - key: user.email
      value: "root@{{ ansible_facts['hostname'] }}"
    - key: user.name
      value: "root@{{ ansible_facts['hostname'] }}"

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Symlink resolv.conf to stub resolver
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
    follow: false
  notify: Etckeeper commit

- name: Create /etc/X11/xorg.conf.d
  ansible.builtin.file:
    path: /etc/X11/xorg.conf.d
    state: directory
    mode: '0755'

- name: Configure macOS-style keyboard layout
  ansible.builtin.copy:
    dest: /etc/X11/xorg.conf.d/00-keyboard.conf
    content: |
      Section "InputClass"
          Identifier "system-keyboard"
          MatchIsKeyboard "on"
          Option "XkbLayout" "us"
          Option "XkbVariant" "mac"
      EndSection
    mode: '0644'
  notify: Etckeeper commit

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Create /etc/1password directory
  ansible.builtin.file:
    path: /etc/1password
    state: directory
    mode: '0755'
  notify: Etckeeper commit

- name: Allow Helium browser in 1Password
  ansible.builtin.lineinfile:
    path: /etc/1password/custom_allowed_browsers
    line: helium
    create: true
    mode: '0644'
  notify: Etckeeper commit

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Create logind.conf.d directory
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d
    state: directory
    mode: '0755'

- name: Write logind power-key drop-in
  ansible.builtin.template:
    src: "{{ 'logind-power-key.conf.j2' if has_resume else 'logind-disable-sleep.conf.j2' }}"
    dest: "/etc/systemd/logind.conf.d/{{ 'power-key' if has_resume else 'disable-sleep' }}.conf"
    mode: '0644'
  notify:
    - Reload logind
    - Etckeeper commit

- name: Mask sleep targets
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: true
  loop:
    - hibernate.target
    - hybrid-sleep.target
    - sleep.target
    - suspend-then-hibernate.target
    - suspend.target
  when: not has_resume
  notify: Etckeeper commit

- name: Create sleep.conf.d directory
  ansible.builtin.file:
    path: /etc/systemd/sleep.conf.d
    state: directory
    mode: '0755'
  when: not has_resume

- name: Write sleep disable config
  ansible.builtin.copy:
    dest: /etc/systemd/sleep.conf.d/disable-sleep.conf
    content: |
      [Sleep]
      AllowHibernation=no
      AllowHybridSleep=no
      AllowSuspendThenHibernate=no
      AllowSuspend=no
    mode: '0644'
  when: not has_resume
  notify: Etckeeper commit

- name: Write ThinkPad power-button udev rule
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/99-power-button-sway.rules
    content: |
      # Strips power-switch tag so logind releases its exclusive grab.
      # Allows libinput/Sway to handle XF86PowerOff via bindsym.
      SUBSYSTEM=="input", KERNEL=="event*", ATTRS{name}=="Power Button", ATTRS{phys}=="*LNXPWRBN*", \
          TAG-="power-switch", TAG+="seat", TAG+="uaccess"
    mode: '0644'
  when: not has_powerbutton_events
  notify:
    - Reload udev
    - Etckeeper commit

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Create /etc/systemd/system-sleep
  ansible.builtin.file:
    path: /etc/systemd/system-sleep
    state: directory
    mode: '0755'

- name: Install FUSE abort sleep hook
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-unmount-fuse"
    dest: /etc/systemd/system-sleep/gatherd-unmount-fuse
    mode: '0755'
    remote_src: true
  notify: Etckeeper commit

- name: Install suspend-failed notification script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-notify-failed-suspend"
    dest: /usr/local/bin/gatherd-notify-failed-suspend
    mode: '0755'
    remote_src: true
  notify: Etckeeper commit

- name: Create /etc/systemd/system/systemd-suspend.service.d
  ansible.builtin.file:
    path: /etc/systemd/system/systemd-suspend.service.d
    state: directory
    mode: '0755'

- name: Disable systemd user-session freeze before suspend
  ansible.builtin.copy:
    dest: /etc/systemd/system/systemd-suspend.service.d/no-freeze-user-sessions.conf
    content: |
      [Service]
      Environment="SYSTEMD_SLEEP_FREEZE_USER_SESSIONS=false"
    mode: '0644'
  notify: Etckeeper commit

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Install pbcopy / pbpaste
  ansible.builtin.copy:
    dest: "/usr/local/bin/{{ item.name }}"
    content: "{{ item.content }}"
    mode: '0755'
  loop:
    - name: pbcopy
      content: "#!/bin/sh\nexec wl-copy \"$@\"\n"
    - name: pbpaste
      content: "#!/bin/sh\nexec wl-paste --no-newline \"$@\"\n"
    - name: tailscale-systray
      content: "#!/bin/sh\npkill -f 'tailscale systray' 2>/dev/null\nexec tailscale systray\n"


- name: Mask services that conflict with TLP
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: true
  loop:
    - systemd-rfkill.service
    - systemd-rfkill.socket
    - power-profiles-daemon.service

- name: Enable system services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - sshd
    - tailscaled
    - cups
    - cups-browsed
    - bluetooth
    - systemd-resolved
    - paccache.timer
    - cronie
    - tlp

- name: Configure firewall default zone
  ansible.builtin.command: firewall-cmd --set-default-zone=home
  changed_when: false

- name: Open LocalSend firewall ports
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
  loop:
    - 53317/tcp
    - 53317/udp
  notify: Reload firewall

- name: Configure greetd PAM to start gnome-keyring at login
  ansible.builtin.lineinfile:
    path: /etc/pam.d/greetd
    line: "session    optional     pam_gnome_keyring.so auto_start"
  notify: Etckeeper commit

- name: Remove gnome-keyring PAM auth line (starts --login daemon with autologin, locking keyring with unknown password)
  ansible.builtin.lineinfile:
    path: /etc/pam.d/greetd
    line: "auth       optional     pam_gnome_keyring.so"
    state: absent
  notify: Etckeeper commit

- name: Configure greetd Sway autologin
  ansible.builtin.blockinfile:
    path: /etc/greetd/greetd.conf
    block: |
      [initial_session]
      command = "sway"
      user = "{{ target_user }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
  notify: Etckeeper commit

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Configure ThinkPad battery charge thresholds
  ansible.builtin.lineinfile:
    path: /etc/tlp.conf
    regexp: '^#?\s*{{ item.key }}='
    line: "{{ item.key }}={{ item.value }}"
  loop:
    - key: START_CHARGE_THRESH_BAT0
      value: 75
    - key: STOP_CHARGE_THRESH_BAT0
      value: 80
  when: has_thinkpad_hardware
  notify: Etckeeper commit

- name: Pre-configure known WiFi networks
  ansible.builtin.copy:
    dest: "/etc/NetworkManager/system-connections/{{ item.ssid }}.nmconnection"
    mode: '0600'
    content: |
      [connection]
      id={{ item.ssid }}
      uuid={{ item.ssid | to_uuid }}
      type=wifi
      autoconnect=true

      [wifi]
      mode=infrastructure
      ssid={{ item.ssid }}

      [wifi-security]
      auth-alg=open
      key-mgmt=wpa-psk
      psk={{ item.psk }}

      [ipv4]
      method=auto

      [ipv6]
      addr-gen-mode=default
      method=auto

      [proxy]
  loop:
    - ssid: LaPromNyack
      psk: "whats4dinner?"
  notify:
    - Reload NetworkManager connections
    - Etckeeper commit

- name: Run firmware updates
  ansible.builtin.shell: |
    fwupdmgr get-updates || true
    fwupdmgr update || true
  changed_when: false

