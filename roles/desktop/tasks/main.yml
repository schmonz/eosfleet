---
- name: Create required config directories
  ansible.builtin.file:
    path: "{{ target_home }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - .local/bin
    - .config/arch-update
    - .config/systemd/user/timers.target.wants
    - .config/gtklock
    - .config/environment.d
    - .config/sway/config.d
    - .local/share/applications/kde4
    - .config/net.imput.helium/Default
    - .config/chromium/Default
    - .local/share/org.localsend.localsend_app
    - .cache/captive-browser

- name: Enable system dark mode
  # Without this, the default ('default') leaves GTK, Flutter, and other apps guessing.
  # dbus-run-session creates a throwaway bus; no user session needed.
  ansible.builtin.shell: |
    cur=$(dbus-run-session gsettings get org.gnome.desktop.interface color-scheme 2>/dev/null)
    [ "$cur" = "'prefer-dark'" ] || {
      dbus-run-session gsettings set org.gnome.desktop.interface color-scheme prefer-dark
      echo changed
    }
  register: _darkmode
  changed_when: "'changed' in _darkmode.stdout"

- name: Configure sudo askpass (seahorse ssh-askpass, already installed)
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/environment.d/50-askpass.conf"
    content: "SUDO_ASKPASS=/usr/lib/seahorse/ssh-askpass\n"
    mode: '0644'

- name: Add ~/.local/bin to user session PATH
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/environment.d/50-path.conf"
    content: "PATH=${HOME}/.local/bin:${PATH}\n"
    mode: '0644'

- name: Configure gtklock (no unauthenticated power buttons)
  ansible.builtin.template:
    src: gtklock-config.ini.j2
    dest: "{{ target_home }}/.config/gtklock/config.ini"
    mode: '0644'

- name: Remove stock swayidle entries superseded by our configuration
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/autostart_applications"
    regexp: "{{ item }}"
    state: absent
  loop:
    - '^exec swayidle idlehint'
    - '^exec_always swayidle -w before-sleep'

- name: Configure swayidle
  ansible.builtin.blockinfile:
    path: "{{ target_home }}/.config/sway/config.d/autostart_applications"
    block: "{{ lookup('template', 'swayidle-exec.j2') }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: swayidle"

- name: Add XF86PowerOff binding to sway config
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/default"
    line: "bindsym XF86PowerOff exec $powermenu"
    regexp: '^\s*bindsym\s+XF86PowerOff\b'

- name: Disable numlock in sway
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/input"
    line: "input type:keyboard xkb_numlock disabled"
    regexp: '^\s*input\s+type:keyboard\s+xkb_numlock\b'
  when: has_embedded_numpad

- name: Configure TrackPoint middle-button scroll in sway
  ansible.builtin.blockinfile:
    path: "{{ target_home }}/.config/sway/config.d/input"
    block: |
      input type:pointer {
          scroll_method on_button_down
          scroll_button button2
      }
    marker: "# {mark} ANSIBLE MANAGED BLOCK: trackpoint-scroll"
  when: has_thinkpad_trackpoint

- name: Bind ThinkVantage button to open terminal
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/default"
    line: "bindsym XF86Launch1 exec foot"
    regexp: '^\s*bindsym\s+XF86Launch1\b'
  when: has_thinkpad_vantage_button

- name: Remove network throughput widget from waybar center
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/waybar/config"
    regexp: '^\s+"network"\s*,?\s*$'
    state: absent

- name: Add mpris widget to waybar modules-right
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/waybar/config"
    insertafter: '"backlight",'
    line: '        "mpris",'
    regexp: '"mpris"'

- name: Add mpris widget config to waybar
  ansible.builtin.blockinfile:
    path: "{{ target_home }}/.config/waybar/config"
    insertbefore: '"network":'
    marker: "// {mark} ANSIBLE MANAGED BLOCK: mpris"
    block: |2
          "mpris": {
              "format": "{player_icon} {title} — {artist}",
              "format-paused": "{status_icon} {title} — {artist}",
              "player-icons": { "default": "▶" },
              "status-icons": { "paused": "⏸" },
              "max-length": 40
          },

- name: Add mpris to waybar CSS module list
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/waybar/style.css"
    insertafter: '#backlight,'
    regexp: '#mpris,'
    line: '#mpris,'

- name: Add mpris min-width to waybar CSS
  ansible.builtin.blockinfile:
    path: "{{ target_home }}/.config/waybar/style.css"
    insertbefore: '^#pulseaudio \{'
    marker: "/* {mark} ANSIBLE MANAGED BLOCK: mpris */"
    block: |
      #mpris {
          min-width: 8em;
      }

- name: Configure waybar to use btop
  ansible.builtin.replace:
    path: "{{ target_home }}/.config/waybar/config"
    regexp: '\bhtop\b'
    replace: btop

- name: Configure waybar bar font size
  ansible.builtin.replace:
    path: "{{ target_home }}/.config/waybar/style.css"
    after: '^#waybar\s*\{'
    before: '^}'
    regexp: 'font-size:\s*\d+px'
    replace: "font-size: {{ (13 * foot_font_size / 10) | round | int }}px"

- name: Configure waybar workspaces font size
  ansible.builtin.replace:
    path: "{{ target_home }}/.config/waybar/style.css"
    after: '^#workspaces\s*\{'
    before: '^}'
    regexp: 'font-size:\s*\d+px'
    replace: "font-size: {{ (13 * foot_font_size / 10) | round | int }}px"

- name: Configure waybar power button font size
  ansible.builtin.replace:
    path: "{{ target_home }}/.config/waybar/style.css"
    after: '^#custom-power\s*\{'
    before: '^}'
    regexp: 'font-size:\s*\d+px'
    replace: "font-size: {{ (15 * foot_font_size / 10) | round | int }}px"

- name: Configure foot font size for 80-col two-up layout
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/foot/foot.ini"
    regexp: '^font='
    line: "font=JetBrainsMono-Regular:size={{ foot_font_size }}"

- name: Configure xed font size for 80-col two-up layout
  ansible.builtin.shell: |
    font="JetBrains Mono 10"
    cur=$(dbus-run-session gsettings get org.x.editor.preferences.editor editor-font 2>/dev/null)
    use=$(dbus-run-session gsettings get org.x.editor.preferences.editor use-default-font 2>/dev/null)
    if [ "$cur" = "'$font'" ] && [ "$use" = "false" ]; then
      echo ok
    else
      dbus-run-session gsettings set org.x.editor.preferences.editor use-default-font false
      dbus-run-session gsettings set org.x.editor.preferences.editor editor-font "$font"
      echo changed
    fi
  register: _xed_font
  changed_when: _xed_font.stdout == 'changed'

- name: Configure GTK text scaling factor
  ansible.builtin.command:
    cmd: "dbus-run-session gsettings set org.gnome.desktop.interface text-scaling-factor {{ foot_font_size | float / 10.0 }}"
  changed_when: false

- name: Configure Sway window title font size
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/theme"
    regexp: '^font pango:'
    line: "font pango:Noto Sans Regular {{ foot_font_size }}"

- name: Configure mako notification font size
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/mako/config"
    regexp: '^font='
    line: "font=UbuntuMono {{ (12.5 * foot_font_size / 10) | round(1) }}"

- name: Configure fuzzel font size
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/fuzzel/fuzzel.ini"
    regexp: '^font='
    line: "font=JetBrainsMono-Regular:size={{ foot_font_size }}"

- name: Enable foot browser launch
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/foot/foot.ini"
    regexp: '^#?\s*launch=xdg-open \$\{url\}$'
    line: "launch=xdg-open ${url}"

- name: Replace sway default browser with xdg-open
  ansible.builtin.replace:
    path: "{{ target_home }}/.config/sway/config.d/default"
    regexp: 'exec firefox'
    replace: "exec xdg-open https://"

- name: Disable EOS greeter
  community.general.ini_file:
    path: "{{ target_home }}/.config/EOS-greeter.conf"
    section: null
    option: Greeter
    value: disable
    no_extra_spaces: true
    create: true
    mode: '0644'

- name: Hide unwanted desktop entries
  ansible.builtin.copy:
    dest: "{{ target_home }}/{{ item }}"
    content: |
      [Desktop Entry]
      Hidden=true
    mode: '0644'
  loop:
    - .local/share/applications/chromium.desktop
    - .local/share/applications/kde4/webapp-manager.desktop

- name: Set default browser via mimeapps
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/mimeapps.list"
    content: |
      [Default Applications]
      x-scheme-handler/http=helium.desktop
      x-scheme-handler/https=helium.desktop
      text/html=helium.desktop
      application/xhtml+xml=helium.desktop
      text/plain=org.x.editor.desktop
      text/markdown=org.x.editor.desktop
      text/x-markdown=org.x.editor.desktop
    mode: '0644'

- name: Configure browser preferences
  ansible.builtin.copy:
    dest: "{{ target_home }}/{{ item.dest }}"
    content: "{{ item.content }}\n"
    mode: '0644'
  loop:
    - dest: .config/net.imput.helium/initial_preferences
      content: '{"browser":{"check_default_browser":false},"distribution":{"skip_first_run_ui":true,"suppress_first_run_bubble":true,"show_welcome_page":false},"session":{"restore_on_startup":1}}'
    - dest: .config/chromium/initial_preferences
      content: '{"browser":{"check_default_browser":false},"distribution":{"skip_first_run_ui":true,"suppress_first_run_bubble":true,"show_welcome_page":false},"session":{"restore_on_startup":1}}'
    - dest: .config/helium-browser-flags.conf
      content: "--password-store=basic"
    - dest: .config/chromium-flags.conf
      content: "--password-store=basic"

- name: Seed Helium Default/Preferences on first run only
  # helium.completed_onboarding suppresses the setup tab; must be in Default/Preferences
  # since initial_preferences only seeds known Chromium keys.
  # force: false ensures we never clobber Helium's live prefs on re-runs.
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/net.imput.helium/Default/Preferences"
    content: "{\"browser\":{\"check_default_browser\":false},\"extensions\":{\"theme\":{\"system_theme\":1}},\"helium\":{\"completed_onboarding\":true},\"session\":{\"restore_on_startup\":1}}\n"
    force: false
    mode: '0600'

- name: Seed Helium Memory Saver to Maximum on low-RAM machines
  # Stored in Local State (not Default/Preferences); aggressiveness 2 = Maximum.
  # force: false so Helium's live Local State is never clobbered on re-runs.
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/net.imput.helium/Local State"
    content: "{\"performance_tuning\":{\"high_efficiency_mode\":{\"aggressiveness\":2}}}\n"
    force: false
    mode: '0600'
  when: not has_plenty_of_ram


- name: Configure LocalSend preferences
  # Merges only our keys, preserving any existing keys (certs, session data, etc.)
  ansible.builtin.shell: |
    python3 - <<'PYEOF'
    import json, os
    path = "{{ target_home }}/.local/share/org.localsend.localsend_app/shared_preferences.json"
    try:
        with open(path) as f:
            d = json.load(f)
    except (FileNotFoundError, json.JSONDecodeError):
        d = {}
    want = {
        "flutter.ls_alias": "{{ lookup('pipe', 'hostname -s') }}",
        "flutter.ls_color": "system",
        "flutter.ls_minimize_to_tray": True,
    }
    if all(d.get(k) == v for k, v in want.items()):
        print("ok")
    else:
        d.update(want)
        with open(path, 'w') as f:
            json.dump(d, f)
        os.chmod(path, 0o600)
        print("changed")
    PYEOF
  args:
    executable: /bin/bash
  register: _localsend_prefs
  changed_when: _localsend_prefs.stdout == 'changed'

- name: Configure conky to display hostname on desktop
  ansible.builtin.copy:
    dest: "{{ target_home }}/.conkyrc"
    mode: '0644'
    content: |
      conky.config = {
          out_to_wayland = true,
          out_to_x = false,
          alignment = 'bottom_right',
          gap_x = 20,
          gap_y = 20,

          own_window = true,
          own_window_type = 'desktop',
          own_window_transparent = true,

          font = 'Noto Sans:bold:size={{ (foot_font_size | int * 16 / 14) | round | int }}',
          default_color = 'white',
          draw_shades = true,

          update_interval = 3600,
          double_buffer = true,
      };

      conky.text = [[${alignr}${exec {{ target_home }}/.local/bin/gatherd-describe-machine}
      ${alignr}${nodename}]];

- name: Configure arch-update
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/arch-update/arch-update.conf"
    content: |
      AURHelper=yay
      NoFlatpak
    mode: '0644'

- name: Configure xdg-terminal-exec to use foot
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/xdg-terminals.list"
    content: "foot.desktop\n"
    mode: '0644'

- name: Enable arch-update timer
  # systemd-specific; will need a different mechanism on Artix/s6
  ansible.builtin.file:
    path: "{{ target_home }}/.config/systemd/user/timers.target.wants/arch-update.timer"
    src: /usr/lib/systemd/user/arch-update.timer
    state: link

- name: Configure captive-browser to use Ungoogled Chromium
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/captive-browser.toml"
    mode: '0644'
    content: |
      browser = """
      helium-browser \
        --class=captive-browser \
        --user-data-dir="$HOME/.cache/captive-browser" \
        --proxy-server="socks5://$PROXY" \
        --host-resolver-rules="MAP * ~NOTFOUND , EXCLUDE localhost" \
        --no-first-run --new-window --incognito \
        http://neverssl.com
      """

      dhcp-dns = "nmcli -g IP4.DNS dev show $(nmcli -t -f DEVICE,TYPE,STATE dev | awk -F: '/wifi:connected/{print $1; exit}') | cut -d, -f1"

      socks5-addr = "localhost:1666"

- name: Install gatherd-prompt-captiveportal script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-prompt-captiveportal"
    dest: "{{ target_home }}/.local/bin/gatherd-prompt-captiveportal"
    mode: '0755'
    remote_src: true

- name: Install gatherd-fix-webapps script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-fix-webapps"
    dest: "{{ target_home }}/.local/bin/gatherd-fix-webapps"
    mode: '0755'
    remote_src: true

- name: Install gatherd-describe-machine script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-describe-machine"
    dest: "{{ target_home }}/.local/bin/gatherd-describe-machine"
    mode: '0755'
    remote_src: true

- name: Install gatherd-notify-failed-suspend script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-notify-failed-suspend"
    dest: "{{ target_home }}/.local/bin/gatherd-notify-failed-suspend"
    mode: '0755'
    remote_src: true

- name: Install gatherd-systray-tailscale script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-systray-tailscale"
    dest: "{{ target_home }}/.local/bin/gatherd-systray-tailscale"
    mode: '0755'
    remote_src: true

- name: Install gatherd-systray-1password script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-systray-1password"
    dest: "{{ target_home }}/.local/bin/gatherd-systray-1password"
    mode: '0755'
    remote_src: true

- name: Install gatherd-systray-localsend script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-systray-localsend"
    dest: "{{ target_home }}/.local/bin/gatherd-systray-localsend"
    mode: '0755'
    remote_src: true

- name: Install gatherd-systray-updater script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-systray-updater"
    dest: "{{ target_home }}/.local/bin/gatherd-systray-updater"
    mode: '0755'
    remote_src: true

- name: Install gatherd-pbcopy and gatherd-pbpaste scripts
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/{{ item }}"
    dest: "{{ target_home }}/.local/bin/{{ item }}"
    mode: '0755'
    remote_src: true
  loop:
    - gatherd-pbcopy
    - gatherd-pbpaste

- name: Symlink pbcopy and pbpaste to gatherd- variants
  ansible.builtin.file:
    src: "{{ item }}"
    dest: "{{ target_home }}/.local/bin/{{ item | regex_replace('^gatherd-', '') }}"
    state: link
  loop:
    - gatherd-pbcopy
    - gatherd-pbpaste

- name: Configure Zoom Wayland sharing
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/zoomus.conf"
    line: enableWaylandShare=true
    create: true
    mode: '0644'

- name: Inhibit idle for helium fullscreen
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/application_defaults"
    line: 'for_window [app_id="helium"] inhibit_idle fullscreen'

- name: Float captive-browser window
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/application_defaults"
    line: 'for_window [app_id="captive-browser"] floating enable, resize set width 70 ppt height 70 ppt'

- name: Write post-setup notes
  # accept-dns and accept-routes require an authenticated tailscale session, so
  # they can't run during setup.
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/gatherd-post-setup.md"
    content: |
      Manual steps remaining:

      # 1Password
      - Open seahorse
      - Create a "login" keyring with no password
      - Sign in to 1Password
      - Lock, unlock, enter 2FA code

      # Tailscale
      - Connect
      - Run `tailscale set --accept-dns=true --accept-routes`
      - Fix exit node: check admin console ("cannot relay traffic")

      # iCloud
      - `rclone config`
      - When auth fails, grab Cookie and `X-APPLE-WEBAUTH-HSA-TRUST` from browser devtools,
        then `rclone config update icloud cookies='' trust_token=''`
      - Token expires monthly
      - [Details](https://forum.rclone.org/t/icloud-connect-not-working-http-error-400/52019/44)

      # Claude
      - Desktop: log in via the app
      - Code: run `claude` in a terminal

      # Zoom
      - Log in
      - Try sharing a window — confirm screen sharing works under Sway/wlroots

      # Timeshift
      - Open Timeshift, confirm BTRFS is selected, click Finish

      # Verify
      - Screen lock: let screen time out, then wiggle/tap — should see lock screen
      - Screen lock: close lid, reopen — should see lock screen
      - LocalSend: check alias is system hostname, not a random phrase
      - On low-RAM machines: Helium → Settings → Performance — Memory Saver should be Maximum
      - Captive portal: join a portal network, confirm Helium opens automatically and portal login works
      - Power management: run `tlp-stat | head -30` — confirm "Status: enabled" and correct power source
      - Power management (ThinkPad): run `tlp-stat -b | grep -i thresh` — confirm 75/80 thresholds
      - Power management: run `sudo powertop --time=5` — Tunables tab should be mostly "Good"
      - Power management: on battery, run `upower -i $(upower -e | grep BAT)` — check energy-rate in watts
      - IR receiver (T60/MBP): run `ls /dev/lirc* /sys/class/rc/rc* 2>/dev/null` — should show at least one device
      - IR receiver (T60/MBP): run `ir-keytable` — confirm device listed with a keymap loaded
      - IR receiver (T60/MBP): run `ir-keytable -t -s rc0` and press remote buttons — should show scancode + keycode per press
      - ThinkPad fan control: run `cat /proc/acpi/ibm/fan` — should show current speed level and RPM
      - ThinkPad fan control: run `systemctl status thinkfan` — should be active
      - TrackPoint scroll (ThinkPad): in any scrollable window, hold middle button and push TrackPoint — should scroll
      - ThinkVantage button (T60): press blue ThinkVantage button — should open a terminal

    mode: '0644'

- name: Install gatherd-prompt-1password script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-prompt-1password"
    dest: "{{ target_home }}/.local/bin/gatherd-prompt-1password"
    mode: '0755'
    remote_src: true

- name: Install gatherd-prompt-tailscale script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-prompt-tailscale"
    dest: "{{ target_home }}/.local/bin/gatherd-prompt-tailscale"
    mode: '0755'
    remote_src: true

- name: Install gatherd-prompt-postsetup script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-prompt-postsetup"
    dest: "{{ target_home }}/.local/bin/gatherd-prompt-postsetup"
    mode: '0755'
    remote_src: true

- name: Remove obsolete gnome-keyring --unlock autostart lines
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/autostart_applications"
    regexp: 'gnome-keyring-daemon --unlock'
    state: absent

- name: Add conky autostart entry
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/autostart_applications"
    line: "exec conky"

- name: Add gatherd script autostart entries
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/autostart_applications"
    regexp: "^exec (?:.*/)?{{ item }}$"
    line: "exec {{ target_home }}/.local/bin/{{ item }}"
  loop:
    - gatherd-systray-1password
    - gatherd-systray-localsend
    - gatherd-systray-tailscale
    - gatherd-systray-updater
    - gatherd-fix-webapps
    - gatherd-prompt-captiveportal
    - gatherd-prompt-1password
    - gatherd-prompt-tailscale
    - gatherd-prompt-postsetup
