---
- name: Create required config directories
  ansible.builtin.file:
    path: "{{ target_home }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - .config/gtklock
    - .config/environment.d
    - .local/share/applications/kde4
    - .config/net.imput.helium/Default
    - .config/chromium/Default

- name: Configure sudo askpass (seahorse ssh-askpass, already installed)
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/environment.d/50-askpass.conf"
    content: "SUDO_ASKPASS=/usr/lib/seahorse/ssh-askpass\n"
    mode: '0644'

- name: Configure gtklock (no unauthenticated power buttons)
  ansible.builtin.template:
    src: gtklock-config.ini.j2
    dest: "{{ target_home }}/.config/gtklock/config.ini"
    mode: '0644'

- name: Remove stock swayidle entries superseded by our configuration
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/autostart_applications"
    regexp: "{{ item }}"
    state: absent
  loop:
    - '^exec swayidle idlehint'
    - '^exec_always swayidle -w before-sleep'

- name: Configure swayidle
  ansible.builtin.blockinfile:
    path: "{{ target_home }}/.config/sway/config.d/autostart_applications"
    block: "{{ lookup('template', 'swayidle-exec.j2') }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: swayidle"

- name: Add XF86PowerOff binding to sway config
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/default"
    line: "bindsym XF86PowerOff exec $powermenu"
    regexp: '^\s*bindsym\s+XF86PowerOff\b'

- name: Configure waybar to use btop
  ansible.builtin.replace:
    path: "{{ target_home }}/.config/waybar/config"
    regexp: '\bhtop\b'
    replace: btop


- name: Enable foot browser launch
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/foot/foot.ini"
    regexp: '^#?\s*launch=xdg-open \$\{url\}$'
    line: "launch=xdg-open ${url}"

- name: Replace sway default browser with xdg-open
  ansible.builtin.replace:
    path: "{{ target_home }}/.config/sway/config.d/default"
    regexp: 'exec firefox'
    replace: "exec xdg-open https://"

- name: Disable EOS greeter
  ansible.builtin.ini_file:
    path: "{{ target_home }}/.config/EOS-greeter.conf"
    section: null
    option: Greeter
    value: disable
    no_extra_spaces: yes
    create: yes

- name: Hide unwanted desktop entries
  ansible.builtin.copy:
    dest: "{{ target_home }}/{{ item }}"
    content: |
      [Desktop Entry]
      Hidden=true
    mode: '0644'
  loop:
    - .local/share/applications/chromium.desktop
    - .local/share/applications/kde4/webapp-manager.desktop

- name: Set default browser via mimeapps
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/mimeapps.list"
    content: |
      [Default Applications]
      x-scheme-handler/http=helium.desktop
      x-scheme-handler/https=helium.desktop
      text/html=helium.desktop
      application/xhtml+xml=helium.desktop
    mode: '0644'

- name: Configure browser preferences
  ansible.builtin.copy:
    dest: "{{ target_home }}/{{ item.dest }}"
    content: "{{ item.content }}\n"
    mode: '0644'
  loop:
    - dest: .config/net.imput.helium/initial_preferences
      content: '{"browser":{"check_default_browser":false},"distribution":{"skip_first_run_ui":true,"suppress_first_run_bubble":true,"show_welcome_page":false},"session":{"restore_on_startup":1}}'
    - dest: .config/chromium/initial_preferences
      content: '{"browser":{"check_default_browser":false},"distribution":{"skip_first_run_ui":true,"suppress_first_run_bubble":true,"show_welcome_page":false},"session":{"restore_on_startup":1}}'
    - dest: .config/net.imput.helium/Default/Preferences
      content: '{"browser":{"check_default_browser":false},"session":{"restore_on_startup":1}}'
    - dest: .config/chromium/Default/Preferences
      content: '{"browser":{"check_default_browser":false},"session":{"restore_on_startup":1}}'
    - dest: .config/helium-browser-flags.conf
      content: "--password-store=basic"
    - dest: .config/chromium-flags.conf
      content: "--password-store=basic"

- name: Configure Zoom Wayland sharing
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/zoomus.conf"
    line: enableWaylandShare=true
    create: yes

- name: Inhibit idle for helium fullscreen
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/application_defaults"
    line: 'for_window [app_id="helium"] inhibit_idle fullscreen'

- name: Write post-setup notes
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/endeavour-post-setup.txt"
    content: |
      Manual steps remaining:

        tailscale up
        tailscale set --accept-dns=true
        tailscale set --accept-routes
        rclone config (optional)
    mode: '0644'

- name: Show post-setup notes and 1Password extension prompt on first Sway login
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/autostart_applications"
    line: >-
      exec sh -c 'test -f ~/.config/.setup-notes-shown || {
      xdg-open "https://chromewebstore.google.com/detail/1password-%E2%80%93-password-mana/aeblfdkhhhdcdjpifhhbdiojplfjncoa" &
      foot sh -c "cat ~/.config/endeavour-post-setup.txt; echo; read -r -p \"Press Enter to dismiss.\" _" &&
      touch ~/.config/.setup-notes-shown; }'

- name: Add sway autostart entries
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/autostart_applications"
    line: "exec {{ item }}"
  loop:
    - sh -c 'echo "" | GNOME_KEYRING_CONTROL=$XDG_RUNTIME_DIR/keyring gnome-keyring-daemon --unlock'
    - env XDG_CURRENT_DESKTOP=GNOME 1password
    - localsend --hidden
    - tailscale-systray
