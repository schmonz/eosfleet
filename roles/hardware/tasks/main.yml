---
- name: Grant NOPASSWD pacman for AUR installs
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    line: "{{ target_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman"
    validate: visudo -cf %s
  become: true
  become_user: root

- block: # noqa: name[missing]
    - name: Import AVS audio tasks
      ansible.builtin.import_tasks: avs_audio.yml
      when: has_avs_audio

    - name: Import Chromebook F-key tasks
      ansible.builtin.import_tasks: cros_fkeys.yml
      when: has_cros_fkeys

    - name: Install clight (inoperative until configured)
      ansible.builtin.import_tasks: ambient_light.yml
      when: has_screen_backlight or has_kbd_backlight

    - name: Import Apple SMC tasks
      ansible.builtin.import_tasks: applesmc.yml
      when: has_applesmc

    - name: Import FaceTime HD tasks
      ansible.builtin.import_tasks: facetimehd.yml
      when: has_facetimehd

    - name: Import phantom display tasks
      ansible.builtin.import_tasks: phantom_display.yml
      when: has_phantom_second_display

    - name: Import zswap tasks
      ansible.builtin.import_tasks: zswap.yml
      when: not has_plenty_of_ram

    - name: Import software GL tasks
      ansible.builtin.import_tasks: software_gl.yml
      when: not has_gl_capable_gpu

    - name: Import keyboard backlight tasks
      ansible.builtin.import_tasks: kbd_backlight.yml
      when: has_kbd_backlight

    - name: Import lid handler tasks
      ansible.builtin.import_tasks: lid_handler.yml
      when: not has_lid_events

  always:
    - name: Revoke NOPASSWD pacman
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        line: "{{ target_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman"
        state: absent
        validate: visudo -cf %s
      become: true
      become_user: root
