---
# Chromebook prerequisite: update firmware to MrChromebox full ROM before installing.
# https://docs.mrchromebox.tech/docs/firmware/updating-firmware.html
- name: Clone cros-keyboard-map
  ansible.builtin.git:
    repo: https://github.com/WeirdTreeThing/cros-keyboard-map.git
    dest: "{{ target_home }}/trees/cros-keyboard-map"
    update: no
  become_user: "{{ target_user }}"

- name: Install keyd
  community.general.pacman:
    name: keyd
    state: present

- name: Install Chromebook F-keys
  # TODO: not idempotent — reruns every playbook run. Add a creates: guard once
  # we know what artifact install.sh produces.
  ansible.builtin.shell: echo "N" | ./install.sh
  args:
    chdir: "{{ target_home }}/trees/cros-keyboard-map"
  changed_when: true
