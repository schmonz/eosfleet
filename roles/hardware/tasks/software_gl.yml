---
- name: Create environment.d directory
  ansible.builtin.file:
    path: "{{ target_home }}/.config/environment.d"
    state: directory
    mode: '0755'
  become_user: "{{ target_user }}"

- name: Force software GL rendering for legacy GPU
  # RV370 (PCI 1002:5b6x, Radeon X300/X600) and M26 (PCI 1002:7145, Mobility Radeon
  # X1400) cannot drive modern OpenGL; llvmpipe via LIBGL_ALWAYS_SOFTWARE=1 is the
  # only working renderer on these GPUs.
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/environment.d/50-softgl.conf"
    content: "LIBGL_ALWAYS_SOFTWARE=1\n"
    mode: '0644'
  become_user: "{{ target_user }}"
