---
- name: Detect target user and hardware
  hosts: localhost
  connection: local
  gather_facts: true
  become: true
  any_errors_fatal: true

  pre_tasks:
    - name: Install required Ansible collections
      ansible.builtin.command: >
        ansible-galaxy collection install
        --requirements-file {{ setup_dir }}/requirements.yml
      changed_when: false

    - name: Detect target user
      ansible.builtin.command: >
        awk -F: '$3 >= 1000 && $3 < 65534 { print $1; exit }' /etc/passwd
      register: _target_user
      changed_when: false
      failed_when: _target_user.stdout == ''

    - name: Detect target home directory
      ansible.builtin.command: "getent passwd {{ _target_user.stdout }}"
      register: _target_passwd
      changed_when: false

    - name: Set target_user and target_home facts
      ansible.builtin.set_fact:
        target_user: "{{ _target_user.stdout }}"
        target_home: "{{ _target_passwd.stdout.split(':')[5] }}"

  roles:
    - machine_facts


- name: System configuration
  hosts: localhost
  connection: local
  gather_facts: false
  become: true
  any_errors_fatal: true

  roles:
    - system
    - hardware


- name: User configuration
  hosts: localhost
  connection: local
  gather_facts: false
  become: true
  # su rather than sudo: the runner is root, so su requires no password and
  # works regardless of whether target_user has sudo configured yet.
  become_method: ansible.builtin.su
  become_user: "{{ target_user }}"
  any_errors_fatal: true

  roles:
    - dotfiles
    - aur
    - desktop

  post_tasks:
    - name: Grant NOPASSWD pacman for thinkfan install
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        line: "{{ target_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman"
        validate: visudo -cf %s
      when: has_thinkpad_hardware
      become: true
      become_user: root

    - block: # noqa: name[missing]
        - name: Install thinkfan
          kewlfft.aur.aur:
            name: thinkfan
            use: yay
            state: present
          when: has_thinkpad_hardware
      always:
        - name: Revoke NOPASSWD pacman after thinkfan install
          ansible.builtin.lineinfile:
            path: /etc/sudoers
            line: "{{ target_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman"
            state: absent
            validate: visudo -cf %s
          when: has_thinkpad_hardware
          become: true
          become_user: root

    - name: Enable thinkfan service
      ansible.builtin.systemd:
        name: thinkfan
        enabled: true
        # thinkpad_acpi must load with fan_control=1 (set by modprobe.d) before
        # thinkfan can start; that requires a reboot after first run.
      when: has_thinkpad_hardware
      become: true
      become_user: root

    - name: Set tailscale operator
      ansible.builtin.command: "tailscale set --operator={{ target_user }}"
      changed_when: false
      become: true
      become_user: root

    - name: Mark setup complete
      ansible.builtin.file:
        path: /etc/gatherd-complete
        state: touch
        mode: '0644'
      become: true
      become_user: root
